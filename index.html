<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tree</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b1020;
            font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            width: min(92vw, 720px);
            padding: 36px 24px;
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(14px);
        }

        .card .name {
            margin: 0 0 8px;
            color: #e2e8f0;
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .card h1 {
            margin: 0 0 26px;
            color: #f8fafc;
            font-size: clamp(2rem, 5vw, 3rem);
        }

        .links {
            display: grid;
            gap: 14px;
        }

        .links a {
            display: block;
            padding: 16px 20px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            border: 1px solid rgba(148, 163, 184, 0.18);
            color: #7dd3fc;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .links a:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            border-color: rgba(125, 211, 252, 0.45);
            color: #e0f2fe;
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="name">Axel Yair Fischbein</p>
        <h1>Mis Links</h1>
        <nav class="links" aria-label="Enlaces principales">
            <a href="Identikit/index.html">Identikit</a>
            <a href="ong_web/index.html">ONG Web</a>
            <a href="https://github.com/AxelYairFischbein" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
    </main>
</body>
</html>
